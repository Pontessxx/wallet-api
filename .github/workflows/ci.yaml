name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Restore & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: backend/**/packages.lock.json

      - name: Restore
        run: dotnet restore backend/AuthApi.slnx

      - name: Build
        run: dotnet build backend/AuthApi.slnx --no-restore --configuration Release

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: backend/**/packages.lock.json

      - name: Test
        run: dotnet test backend/AuthApi.slnx --configuration Release --verbosity normal

  commit-lint:
    name: Validate Commit Prefix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commits
        shell: bash
        run: |
          set -euo pipefail

          ALLOWED_REGEX='^(feat|fix|docs|test|build|perf|style|refactor|chore|cleanup|remove|revert)(\([^)]+\))?: .+'
          RANGE=""

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            RANGE="${BASE_SHA}..${HEAD_SHA}"
            git fetch --no-tags --prune --depth=1 origin "${BASE_SHA}" "${HEAD_SHA}"
          else
            BEFORE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"

            if [[ "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
              RANGE="${HEAD_SHA}"
            else
              RANGE="${BEFORE_SHA}..${HEAD_SHA}"
            fi
          fi

          echo "Checking commit messages in range: ${RANGE}"
          INVALID=0

          while IFS= read -r MESSAGE; do
            [[ -z "${MESSAGE}" ]] && continue

            if ! [[ "${MESSAGE}" =~ ${ALLOWED_REGEX} ]]; then
              echo "Invalid commit message: ${MESSAGE}"
              INVALID=1
            fi
          done < <(git log --format=%s ${RANGE})

          if [[ ${INVALID} -ne 0 ]]; then
            echo ""
            echo "Commit message must start with one of:"
            echo "feat, fix, docs, test, build, perf, style, refactor, chore, cleanup, remove, revert"
            echo ""
            echo "Expected format example: feat(scope): short description"
            exit 1
          fi

          echo "All commit messages have valid prefixes."

  dependency-scan:
    name: NuGet Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: backend/**/packages.lock.json

      - name: Restore
        run: dotnet restore backend/AuthApi.slnx

      - name: Generate vulnerable packages report
        shell: bash
        run: dotnet list backend/AuthApi.slnx package --vulnerable --include-transitive --format json > dependency-vulnerabilities.json

      - name: Fail when vulnerabilities are found
        shell: bash
        run: |
          set -euo pipefail
          VULN_COUNT=$(jq '[.projects[]?.frameworks[]? | (.topLevelPackages[]?, .transitivePackages[]?) | .vulnerabilities[]?] | length' dependency-vulnerabilities.json)

          echo "Vulnerabilities found: ${VULN_COUNT}"

          if [[ "${VULN_COUNT}" -gt 0 ]]; then
            echo "Dependency scan failed: vulnerable packages were found."
            echo "See dependency-vulnerabilities.json in workflow logs/artifacts for details."
            exit 1
          fi

          echo "No vulnerable NuGet packages found."

      - name: Upload vulnerability report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-vulnerabilities
          path: dependency-vulnerabilities.json

  secrets-and-filesystem:
    name: Secrets And Filesystem Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: '1'