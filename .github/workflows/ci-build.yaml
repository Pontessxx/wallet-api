name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Restore & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true

      - name: Restore
        run: dotnet restore backend/AuthApi.slnx

      - name: Build
        run: dotnet build backend/AuthApi.slnx --no-restore --configuration Release
