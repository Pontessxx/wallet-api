name: Commit Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  commit-lint:
    name: Validate Commit Prefix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commits
        shell: bash
        run: |
          set -euo pipefail

          ALLOWED_REGEX='^(feat|fix|docs|test|build|perf|style|refactor|chore|cleanup|remove|revert)(\([^)]+\))?: .+'
          RANGE=""

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            RANGE="${BASE_SHA}..${HEAD_SHA}"
            git fetch --no-tags --prune --depth=1 origin "${BASE_SHA}" "${HEAD_SHA}"
          else
            BEFORE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"

            if [[ "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
              RANGE="${HEAD_SHA}"
            else
              RANGE="${BEFORE_SHA}..${HEAD_SHA}"
            fi
          fi

          echo "Checking commit messages in range: ${RANGE}"
          INVALID=0

          while IFS= read -r MESSAGE; do
            [[ -z "${MESSAGE}" ]] && continue

            if ! [[ "${MESSAGE}" =~ ${ALLOWED_REGEX} ]]; then
              echo "Invalid commit message: ${MESSAGE}"
              INVALID=1
            fi
          done < <(git log --format=%s ${RANGE})

          if [[ ${INVALID} -ne 0 ]]; then
            echo ""
            echo "Commit message must start with one of:"
            echo "feat, fix, docs, test, build, perf, style, refactor, chore, cleanup, remove, revert"
            echo ""
            echo "Expected format example: feat(scope): short description"
            exit 1
          fi

          echo "All commit messages have valid prefixes."
